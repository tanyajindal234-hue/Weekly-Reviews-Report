name: Weekly Pulse Report Scheduler

on:
  schedule:
    # Run at 18:16 UTC (11:46 PM IST) for testing purposes
    - cron: '16 18 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI for testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Create required directories
        run: |
          mkdir -p Phase_1_Data_Ingestion/data
          mkdir -p Phase_2_Data_Preprocessing/data
          mkdir -p Phase_3_LLM_Processing/data
          mkdir -p Phase_4_Formatting_and_Email/data
          
      - name: Create .env file from Secrets
        # We write the secrets injected into the runner out to the exact path
        # where our application expects them
        run: |
          mkdir -p venv
          cat << EOF > venv/.env
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT=${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_RECIPIENT_NAME=${{ secrets.EMAIL_RECIPIENT_NAME }}
          EOF
          
      - name: Run Pipeline
        run: |
          python Phase_6_Automation/main_pipeline.py
